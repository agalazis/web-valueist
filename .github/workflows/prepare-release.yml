name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump_version
        run: |
          poetry version ${{ github.event.inputs.bump }}
          NEW_VERSION=$(poetry version -s)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Pick Release Name
        id: pick_name
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t NAVIGATORS < RELEASE_CANDIDATES

          # Fetch previous release titles to find used names
          USED_NAMES=$(gh release list --limit 100 | awk -F'	' '{print $1}')

          REMAINING=()
          for nav in "${NAVIGATORS[@]}"; do
            if ! echo "$USED_NAMES" | grep -q "$nav"; then
              REMAINING+=("$nav")
            fi
          done

          # If all names are used, reset and use the full list
          if [ ${#REMAINING[@]} -eq 0 ]; then
            REMAINING=("${NAVIGATORS[@]}")
          fi

          SELECTED_NAME=${REMAINING[$RANDOM % ${#REMAINING[@]}]}
          echo "SELECTED_NAME=$SELECTED_NAME" >> $GITHUB_ENV
          echo "selected_name=$SELECTED_NAME" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name=v${{ env.NEW_VERSION }} -f target_commitish=${{ github.ref_name }} -q .body > generated_notes.md



      - name: Update Changelog
        run: |
          DATE=$(date +'%Y-%m-%d')
          awk -v ver="${{ env.NEW_VERSION }}" -v name="${{ env.SELECTED_NAME }}" -v date="$DATE" '
            /^## \[.*\] - .*/ && !inserted {
              print "## [" ver "] - " name " - " date
              print ""
              while ((getline line < "generated_notes.md") > 0)
                print line
              close("generated_notes.md")
              print ""
              print $0
              inserted = 1
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit and Push
        run: |
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        run: |
          SELECTED_NAME="${{ env.SELECTED_NAME }}"

          # Extract the specific changelog section for this version
          awk -v ver="${{ env.NEW_VERSION }}" '
            /^## \[/ {
              if (match($0, "^## \\[" ver "\\]")) { p=1; next }
              else if (p) { p=0; nextfile }
            }
            p { print }
          ' CHANGELOG.md > release_notes.md

          # Prepend the intro message to the release notes
          echo "Release v${{ env.NEW_VERSION }} named after the famous historical navigator/cartographer: **$SELECTED_NAME**." | cat - release_notes.md > temp_notes.md && mv temp_notes.md release_notes.md

          gh release create v${{ env.NEW_VERSION }} --title "v${{ env.NEW_VERSION }} - $SELECTED_NAME" -F release_notes.md
