name: Deploy docs to GitHub Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # For a simple markdown-to-pages setup without a static site generator like mkdocs,
      # we can just upload the repo as is (or a docs directory if we have one).
      # Here we assume README.md is enough or we just build a basic static directory.
      # To set CNAME, we create a CNAME file.
      - name: Create CNAME and index.html
        run: |
          mkdir -p docs_site
          echo "web-valueist.csmonk.com" > docs_site/CNAME
          cp README.md docs_site/index.md
          # Convert Markdown to basic HTML for simplest serving if no SSG is used
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Web Valueist</title></head><xmp theme="strapdown" style="display:none;">' > docs_site/index.html
          cat README.md >> docs_site/index.html
          echo '</xmp><script src="http://strapdownjs.com/v/0.2/strapdown.js"></script></html>' >> docs_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
