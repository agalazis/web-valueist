name: Deploy docs to GitHub Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # For a simple markdown-to-pages setup without a static site generator like mkdocs,
      # we can just upload the repo as is (or a docs directory if we have one).
      # Here we assume README.md is enough or we just build a basic static directory.
      # To set CNAME, we create a CNAME file.
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create CNAME and index.html
        run: |
          mkdir -p docs_site
          echo "web-valueist.csmonk.com" > docs_site/CNAME
          # Convert Markdown to HTML using Pandoc, including the Morph Bootswatch theme
          # --embed-resources explicitly base64 encodes and embeds the local logo.svg
          pandoc README.md -f markdown -t html -s --embed-resources --standalone --highlight-style pygments -o docs_site/index.html \
            --metadata title="Web Valueist Documentation" \
            -H <(echo '<link rel="stylesheet" href="https://bootswatch.com/5/morph/bootstrap.min.css"><style>body { max-width: 900px; margin: 0 auto; padding: 2rem; background-color: transparent !important; } pre { background-color: #f8f9fa; padding: 1rem; border-radius: 0.375rem; border: 1px solid #dee2e6; overflow-x: auto; position: relative; } code { background-color: #f8f9fa; padding: 0.2rem 0.4rem; border-radius: 0.375rem; color: #d63384; } pre code { background-color: transparent; padding: 0; color: inherit; border-radius: 0; } div.sourceCode { background-color: #f8f9fa; padding: 1rem; border-radius: 0.375rem; border: 1px solid #dee2e6; position: relative; } div.sourceCode pre { background-color: transparent; padding: 0; border: none; } .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; color: #495057; background-color: #e9ecef; border: 1px solid #ced4da; border-radius: 0.25rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; } div.sourceCode:hover .copy-btn, pre:hover .copy-btn { opacity: 1; }</style><script>document.addEventListener("DOMContentLoaded", function() { document.querySelectorAll("pre").forEach(function(pre) { var wrapper = pre.parentNode; if (!wrapper.classList.contains("sourceCode")) { wrapper = document.createElement("div"); wrapper.style.position = "relative"; pre.parentNode.insertBefore(wrapper, pre); wrapper.appendChild(pre); } else { wrapper.style.position = "relative"; } var button = document.createElement("button"); button.className = "copy-btn"; button.innerText = "Copy"; wrapper.appendChild(button); button.addEventListener("click", function() { var code = pre.querySelector("code"); var textToCopy = code ? code.innerText : pre.innerText; navigator.clipboard.writeText(textToCopy).then(function() { button.innerText = "Copied!"; setTimeout(function() { button.innerText = "Copy"; }, 2000); }).catch(function(err) { console.error("Failed to copy text: ", err); }); }); }); });</script>')

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
